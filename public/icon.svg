<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#1a1d2e"/>
  <!-- Globe circle -->
  <circle cx="256" cy="230" r="150" fill="none" stroke="#6c63ff" stroke-width="18"/>
